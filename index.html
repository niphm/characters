<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#061522">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tidewick Vault">
  <title>Tidewick Character Vault</title>
  <link rel="stylesheet" href="vault.css">
</head>
<body>
  <main class="vault-shell">
    <section class="login-panel" id="loginPanel">
      <img class="vault-mark" src="tidewick-compass-home.png" alt="">
      <p class="eyebrow">Encrypted Character Vault</p>
      <h1>Adventurer Login</h1>
      <p class="intro">Enter your credentials to unlock your assigned character pages.</p>

      <form id="loginForm" autocomplete="on">
        <label>
          Username
          <input id="username" name="username" autocomplete="username" autocapitalize="none" spellcheck="false" required>
        </label>
        <label>
          Password
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </label>
        <button type="submit" id="loginButton">Unlock Vault</button>
      </form>

      <p class="status" id="status" role="status" aria-live="polite"></p>
      <p class="privacy-note">Your password is used only in this browser and is never stored or transmitted.</p>
    </section>

    <section class="viewer" id="viewer" hidden>
      <div class="viewer-bar">
        <strong id="characterTitle">Character Vault</strong>
        <div class="viewer-actions">
          <button type="button" data-page="tracker">Tracker</button>
          <button type="button" data-page="spellbook">Spellbook</button>
          <button type="button" data-page="inventory">Inventory</button>
          <button type="button" id="logoutButton">Lock</button>
        </div>
      </div>
      <iframe id="characterFrame" title="Unlocked character page" sandbox="allow-scripts allow-same-origin"></iframe>
    </section>
  </main>
  <script src="vault.js" defer></script>
</body>
</html>
